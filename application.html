<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка</title>
    <link rel="stylesheet" href="css/application.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap">
</head>
<body>
    <div class="page-wrapper">
        <header class="navigation">
            <div class="navigation-top">
                <img src="img/Group 4.png" alt="logo" class="logo">
                <p class="header-text">Практика</p>
                <img src="img/Frame 27.png" alt="icon" class="icon">
            </div>
            <nav class="navigation-bottom">
                <a href="#">Заявка</a>
                <a href="#">Подтверждение</a>
                <a href="#">Практика</a>
            </nav>
        </header>
        <form class="application">
            <p class="application-main-text">Расскажи нам немного о себе</p>
            <input type="text" placeholder="Фамилия">
            <input type="text" placeholder="Имя">
            <input type="text" placeholder="Отчество">
            <div>
                <input type="radio" value="man" name="gender" checked>
                <label for="man">Мужчина</label>
                <input type="radio" value="woman" name="gender">
                <label for="woman">Женщина</label>
            </div>
            <input type="date" placeholder="Дата рождения">
            <input type="text" placeholder="+7 000 000 00 00">
            <input type="text" placeholder="Направление">
            <input type="text" placeholder="Курс">
            <input type="date" placeholder="Дата начала практики">
            <input type="date" placeholder="Дата окончания практики">
            <button class="application-button">Отправить заявку</button>
        </form>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
