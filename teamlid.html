<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет руководителя</title>
    <link rel="stylesheet" href="css/application.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap">
</head>
<body>
    <div class="page-wrapper">
        <header class="navigation">
            <div class="navigation-top">
                <img src="img/logo.png" alt="logo" class="logo">
                <p class="header-text">Практика</p>
                <div class="right-icons">
                    <button class="send-notification" id="open-notification-popup">Отправить уведомление</button>
                    <img src="img/Frame 27.png" alt="icon" class="icon" id="profile-icon">
                </div>
            </div>
            <nav class="navigation-bottom">
                <a href="#" id="applications-tab" class="active">Заявки</a>
                <a href="#" id="groups-tab">Группы</a>
                <a href="#" id="chat-tab">Чат</a>
            </nav>
        </header>

        <!-- Контейнер для динамического контента -->
        <div class="application-big" id="content-container">
            <!-- Сюда JS будет рендерить всё -->
        </div>
    </div>

    <!-- Попап профиля (остаётся статическим, т.к. он общий) -->
    <div class="profile">
        <div class="profile-header">
            <img src="img/Frame 13.png" alt="profile" class="profile-icon">
            <p class="profile-email"></p>
        </div>
        <hr>
        <button class="logout-button">Выход</button>
    </div>

    <!-- Контейнер для уведомлений -->
    <div id="notification-container"></div>

    <script src="js/teamlid_script.js"></script>
</body>
</html>
