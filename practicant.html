<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет практиканта</title>
    <link rel="stylesheet" href="css/application.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap">
</head>
<body>
    <div class="page-wrapper">
        <header class="navigation">
        <div class="navigation-top">
            <img src="img/logo.png" alt="logo" class="logo">
            <p class="header-text">Практика</p>
            <div class="right-icons">
                <img src="img/icon 03.png" alt="notification" class="notification-icon" id="profile-notification">
                <img src="img/Frame 27.png" alt="icon" class="icon" id="profile-icon">
            </div>
        </div>
            <nav class="navigation-bottom">
                <a href="#" id="profile" class="active">Профиль</a>
                <a href="#" id="practice">Практика</a>
                <a href="#" id="chat">Чат</a>
            </nav>
        </header>
        <div class="application" id="content-container">

        </div>
    </div>

    <!-- Попап профиля -->
    <div class="profile">
        <div class="profile-header">
            <img src="img/Frame 13.png" alt="profile" class="profile-icon">
            <p class="profile-email"></p>
        </div>
        <hr>
        <button class="logout-button">Выход</button>
    </div>

    <!-- Контейнер для уведомлений -->
    <div id="notification-container"></div>

    <!-- <div class="notification-bar" >
        <p class="notification-text">Уведомление</p>
    </div> -->

    <script src="js/pract_script.js"></script>
</body>
</html>
